<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAC-MAN 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="hud">
    <div id="hud-top">
      <div class="panel stat-group">
        <div class="stat"><span class="hud-label">SCORE</span><span id="score">0</span></div>
        <div class="stat"><span class="hud-label">HIGH</span><span id="highscore">0</span></div>
      </div>
      <div id="fright-wrap"><div id="fright-bar"></div></div>
      <div class="panel stat-group">
        <div class="stat"><span class="hud-label">LIVES</span><span id="lives"></span></div>
      </div>
    </div>

    <div id="floor-stack" class="panel"></div>

    <div id="message"></div>
    <div id="toast"></div>
    <div id="shaft-hint"></div>

    <div id="vert-buttons">
      <button id="btn-up" title="Go up a floor (PgUp / E / Space)">&#9650;</button>
      <button id="btn-down" title="Go down a floor (PgDn / Q / Shift)">&#9660;</button>
    </div>

    <div id="compass" class="panel">
      <div id="compass-rose">
        <span class="c-mark c-n">N</span>
        <span class="c-mark c-e">&#183;</span>
        <span class="c-mark c-s">&#183;</span>
        <span class="c-mark c-w">&#183;</span>
      </div>
      <div id="compass-needle"></div>
      <div id="compass-up">&#9650;</div>
    </div>

    <div id="hud-bottom" class="panel">
      <span><b>&#8592;&#8593;&#8594;&#8595;</b> MOVE</span>
      <span><b>PGUP</b> FLOOR UP</span>
      <span><b>PGDN</b> FLOOR DOWN</span>
      <span><b>C</b> VIEW</span>
      <span><b>DRAG</b> CAMERA</span>
    </div>
  </div>
  <div id="popups"></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
